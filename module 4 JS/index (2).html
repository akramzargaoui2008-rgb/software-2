<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Series Search</title>
  <script src="index.js" defer></script>
  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }

    form {
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      padding: 0.4rem;
      font-size: 1rem;
      width: 250px;
    }

    input[type="submit"] {
      padding: 0.4rem 1rem;
      font-size: 1rem;
      cursor: pointer;
    }

    #results {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    article {
      width: 210px;
    }

    article img {
      width: 210px;
      height: 295px;
      object-fit: cover;
    }

    article h2 {
      font-size: 1rem;
      margin: 0.5rem 0 0.25rem;
    }

    article div {
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <h1>TV Series Search</h1>

  <form id="search-form">
    <input id="query" name="q" type="text" placeholder="Enter a TV series name">
    <input type="submit" value="Search">
  </form>

  <div id="results"></div>
</body>

</html>
